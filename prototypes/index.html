<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NutriUst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{
    --blue:#0072FB; --ink-1:#0B1B33; --ink-2:#3E4E75; --ink-3:#8592B4;
    --line:#DCE6F8; --red:#E5484D; --shadow:rgba(20,60,140,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:#F6FAFF;color:var(--ink-1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  #bg::before,#bg::after{content:'';position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;}
  #bg::before{top:-15%;left:-10%;width:55vw;height:55vw;background:radial-gradient(circle,rgba(0,114,251,0.12) 0%,transparent 70%);}
  #bg::after{bottom:-15%;right:-10%;width:45vw;height:45vw;background:radial-gradient(circle,rgba(110,164,251,0.12) 0%,transparent 70%);}
  .card{position:relative;z-index:1;width:100%;max-width:380px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:32px 26px;box-shadow:0 20px 50px var(--shadow);}
  .brand{font-size:20px;font-weight:800;text-align:center;letter-spacing:-0.01em;margin-bottom:4px;}
  .brand span{color:var(--blue);}
  .sub{text-align:center;color:var(--ink-3);font-size:12.5px;font-family:'DM Mono',monospace;margin-bottom:26px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink-1);outline:none;}
  input:focus{border-color:var(--blue);}
  .btn{width:100%;margin-top:20px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(0,114,251,0.28);}
  .btn:disabled{opacity:0.6;}
  .msg{margin-top:14px;font-size:13px;padding:10px 13px;border-radius:10px;display:none;background:rgba(229,72,77,0.08);color:var(--red);border:1px solid rgba(229,72,77,0.25);}
  .msg.show{display:block;}
  .spinner{display:none;text-align:center;margin-top:14px;font-size:12px;color:var(--ink-3);font-family:'DM Mono',monospace;}
  .spinner.show{display:block;}
</style>
</head>
<body>
<div id="bg"></div>
<div class="card">
  <div class="brand">Nutri<span>Ust</span></div>
  <div class="sub">Ingresá con tu usuario o email</div>
  <label>Usuario o email</label>
  <input id="ident" placeholder="tu.usuario o email@ejemplo.com" autocomplete="username">
  <label>Contraseña</label>
  <input id="pass" type="password" placeholder="Contraseña" autocomplete="current-password">
  <button class="btn" id="btnEntrar" onclick="handleSubmit()">Entrar</button>
  <div class="msg" id="msg"></div>
  <div class="spinner" id="spinner">verificando…</div>
</div>

<script>
const SUPABASE_URL = 'https://ebtxzmwsuzzfkamxteyg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidHh6bXdzdXp6ZmthbXh0ZXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDk0NTUsImV4cCI6MjA5Nzc4NTQ1NX0.nBgOxK1ThCDwhixzaUluP75p7RRQ5hfjp3ef1keaHqY';

async function rpc(fn, args){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(args)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok){ throw new Error((data && (data.message || data.hint)) || 'Error de conexión'); }
  return data;
}

function showMsg(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.classList.add('show');
}

async function handleSubmit(){
  const ident = document.getElementById('ident').value.trim();
  const pass = document.getElementById('pass').value.trim();
  document.getElementById('msg').classList.remove('show');
  if(!ident || !pass){ showMsg('Completá usuario/email y contraseña.'); return; }

  document.getElementById('btnEntrar').disabled = true;
  document.getElementById('spinner').classList.add('show');

  try{
    // 1) ¿es el nutricionista (admin)?
    const admin = await rpc('login_nutricionista', { p_identificador: ident, p_password: pass });
    if(admin && admin.length){
      sessionStorage.setItem('nfu_admin_session', 'true');
      window.location.href = 'admin-consultantes.html';
      return;
    }
    // 2) ¿es un consultante?
    const consultante = await rpc('login_consultante', { p_username: ident, p_password: pass });
    if(consultante && consultante.length){
      sessionStorage.setItem('nfu_consultante_id', consultante[0].id);
      sessionStorage.setItem('nfu_consultante_nombre', consultante[0].nombre);
      window.location.href = 'plan_nutricional_reader.html';
      return;
    }
    showMsg('Usuario/email o contraseña incorrectos.');
  }catch(e){
    showMsg('Error de conexión: ' + e.message);
  }finally{
    document.getElementById('btnEntrar').disabled = false;
    document.getElementById('spinner').classList.remove('show');
  }
}

document.getElementById('pass').addEventListener('keydown', e=>{ if(e.key==='Enter') handleSubmit(); });
</script>
</body>
</html>
